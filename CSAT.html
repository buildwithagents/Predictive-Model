<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#ffffff;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
min-height:100vh;
}

/* Main Card */

.card{
width:100%;
max-width:420px;
background:#ffffff;
padding:22px;
border:none;              /* removed border */
outline:none;
box-shadow:none;          /* removed shadow */
border-radius:0;          /* optional */
}

/* Header */

.header{
display:flex;
align-items:center;
gap:18px;
margin-bottom:18px;
}

.ring-wrap{
position:relative;
width:72px;
height:72px;
flex-shrink:0;
}

.ring-label{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:20px;
font-weight:600;
color:#111;
}

.header-text h2{
font-size:17px;
font-weight:600;
margin-bottom:8px;
color:#111;
}

.badge{
display:inline-block;
padding:5px 12px;
font-size:12px;
font-weight:500;
border-radius:8px;
background:#EAF3DE;
color:#3B6D11;
}

/* Text */

.subtext{
font-size:14px;
line-height:1.6;
color:#666;
margin-bottom:18px;
}

/* Button */

.cta-btn{
padding:11px 24px;
border-radius:999px;
border:none;
background:#111;
color:#fff;
font-size:14px;
cursor:pointer;
transition:.3s;
margin-bottom:20px;
}

.cta-btn:hover{
opacity:.9;
}

.cta-btn.triggered{
background:#EAF3DE;
color:#3B6D11;
}

/* Divider */

.divider{
border:none;
height:1px;
background:#f2f2f2;   /* very subtle line */
margin:20px 0;
}

/* Section */

.section-header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:14px;
}

.section-header i{
font-size:18px;
}

.pos-icon{
color:#3B6D11;
}

.neg-icon{
color:#D84040;
}

.section-header span{
font-size:14px;
font-weight:600;
}

/* List */

.factor-list{
list-style:none;
display:flex;
flex-direction:column;
gap:12px;
}

.factor-list li{
display:flex;
align-items:flex-start;
gap:10px;
font-size:14px;
line-height:1.5;
color:#555;
}

.bullet{
font-size:14px;
margin-top:2px;
}

.bullet-pos{
color:#3B6D11;
}

.bullet-neg{
color:#999;
}

.highlight{
color:#D85A30;
font-weight:600;
margin-left:4px;
}

</style>
